<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <!-- Magnet/Camera Icon -->
  <g transform="translate(4, 8)">
    <!-- Horseshoe magnet shape -->
    <path d="M8 40V20C8 11.2 15.2 4 24 4s16 7.2 16 16v20h-8V20c0-4.4-3.6-8-8-8s-8 3.6-8 8v20H8z" fill="#81B29A"/>
    <!-- Magnet poles -->
    <rect x="8" y="36" width="8" height="8" rx="1" fill="#F2CC8F"/>
    <rect x="32" y="36" width="8" height="8" rx="1" fill="#F2CC8F"/>
    <!-- Small camera lens circle -->
    <circle cx="24" cy="22" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="24" cy="22" r="1.5" fill="#FFFFFF"/>
  </g>
  <!-- Text: "Mack" -->
  <text x="56" y="40" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Mack</text>
  <!-- Text: "Magnets" -->
  <text x="148" y="40" font-family="Georgia, 'Playfair Display', serif" font-size="32" font-weight="700" fill="#81B29A" letter-spacing="-0.5">Magnets</text>
  <!-- Subtle tagline -->
  <text x="57" y="54" font-family="'Cormorant Garamond', Georgia, serif" font-size="10" fill="rgba(255,255,255,0.6)" letter-spacing="2" font-weight="600">CUSTOM PHOTO MAGNETS</text>
</svg>
